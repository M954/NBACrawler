<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Pulse · NBA 球星动态</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .tab-bar { display:flex; gap:0; margin-bottom:1.5rem; border-bottom:2px solid var(--border); }
    .tab-btn { padding:0.75rem 1.5rem; background:none; border:none; border-bottom:3px solid transparent; font-size:1rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:var(--transition); }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    .tweet-feed { max-width:680px; margin:0 auto; display:flex; flex-direction:column; gap:1.2rem; }
    .tweet-item { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; transition:var(--transition); border:1px solid var(--border); }
    .tweet-item:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .tweet-header { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.2rem 0.5rem; }
    .tweet-avatar { width:44px; height:44px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1.1rem; flex-shrink:0; }
    .tweet-author { flex:1; }
    .tweet-author-name { font-weight:700; font-size:1rem; color:var(--text); }
    .tweet-author-handle { color:var(--text-muted); font-size:0.85rem; }
    .tweet-time { color:var(--text-subtle); font-size:0.8rem; }
    .tweet-body { padding:0.25rem 1.2rem 0.75rem; }
    .tweet-text-cn { font-size:1.05rem; line-height:1.7; color:var(--text); margin-bottom:0.4rem; }
    .tweet-text-en { font-size:0.85rem; color:var(--text-muted); line-height:1.5; }
    .tweet-screenshot { width:100%; cursor:pointer; }
    .tweet-screenshot img { width:100%; display:block; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .tweet-video { width:100%; position:relative; background:#000; }
    .tweet-video video { width:100%; max-height:480px; display:block; }
    .video-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:#fff; padding:2px 8px; border-radius:4px; font-size:0.75rem; }
    .no-video-badge { display:inline-block; background:var(--warning-soft); color:var(--warning); padding:2px 10px; border-radius:12px; font-size:0.75rem; margin:0.5rem 1.2rem; }
    .tweet-footer { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 1.2rem 1rem; border-top:1px solid var(--border); }
    .tweet-footer a { color:var(--primary); font-size:0.85rem; text-decoration:none; font-weight:600; }
    .tweet-footer a:hover { text-decoration:underline; }
    .action-bar { max-width:680px; margin:0 auto 1.2rem; display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
    .action-bar .btn { padding:0.6rem 1.2rem; border-radius:8px; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; transition:var(--transition); }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { opacity:0.85; }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-secondary { background:var(--bg-card); color:var(--text); border:1px solid var(--border) !important; }
    .btn-video { background:#e91e63; color:#fff; }
    .btn-video:hover { background:#c2185b; }
    .btn-video:disabled { opacity:0.5; cursor:not-allowed; }
    .action-bar select, .action-bar input { padding:0.5rem 0.8rem; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:0.9rem; }
    .action-bar input { flex:1; min-width:150px; }
    .mini-stats { max-width:680px; margin:0 auto 1rem; display:flex; gap:1rem; flex-wrap:wrap; }
    .mini-stat { display:flex; align-items:center; gap:0.4rem; font-size:0.85rem; color:var(--text-muted); }
    .mini-stat strong { color:var(--text); font-size:1.1rem; }
    .gen-progress { max-width:680px; margin:0 auto; padding:0.5rem 0; display:none; }
    .gen-progress.active { display:block; }
    .gen-progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .gen-progress-fill { height:100%; background:var(--primary); border-radius:3px; transition:width 0.3s; }
    .gen-progress-text { font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
    .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; }
    .lightbox.show { display:flex; }
    .lightbox img { max-width:95%; max-height:90vh; border-radius:8px; }
    .lightbox-close { position:absolute; top:20px; right:30px; color:#fff; font-size:2rem; cursor:pointer; z-index:1000; }
    @media(max-width:768px) { .tweet-feed,.action-bar,.mini-stats { padding:0 0.5rem; } }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <img src="/static/logo.png" alt="Basketball Pulse" style="height:48px;width:48px;border-radius:50%;margin-right:8px">
        <div>
          <h1>Basketball Pulse</h1>
          <p class="subtitle">NBA 球星实时动态 · 推文 · AI 视频</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="切换主题"><span id="theme-icon">🌙</span></button>
      </div>
    </div>
  </header>

  <main>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('tweets',this)">🐦 球星推文</button>
      <button class="tab-btn" onclick="switchTab('news',this)">📰 资讯列表</button>
    </div>

    <!-- ====== 推文 Tab (默认) ====== -->
    <div id="tab-tweets">
      <div class="mini-stats">
        <div class="mini-stat">🐦 <strong id="ts-total">0</strong> 推文</div>
        <div class="mini-stat">👤 <strong id="ts-players">0</strong> 球星</div>
        <div class="mini-stat">🎬 <strong id="ts-videos">0</strong> 视频</div>
        <div class="mini-stat">🌐 <strong id="ts-translated">0</strong> 已翻译</div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" id="btn-scrape" onclick="startTweetScraper()">🐦 抓取推文</button>
        <button class="btn btn-stop" id="btn-stop-scrape" onclick="stopTweetScraper()" style="display:none">⏹ 停止抓取</button>
        <button class="btn btn-video" id="btn-video" onclick="startVideoGen()">🎬 生成视频</button>
        <select id="player-filter" onchange="onPlayerFilter()"><option value="">全部球星</option></select>
        <input type="text" id="tweet-search" placeholder="搜索推文..." oninput="filterTweets()">
      </div>
      <div class="gen-progress" id="video-progress">
        <div class="gen-progress-bar"><div class="gen-progress-fill" id="vp-fill" style="width:0%"></div></div>
        <div class="gen-progress-text" id="vp-text">生成视频中...</div>
      </div>

      <!-- 服务日志面板 -->
      <div id="log-panel" style="max-width:680px;margin:0 auto 1rem;display:none">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 1rem;background:var(--border);cursor:pointer" onclick="document.getElementById('log-content').style.display=document.getElementById('log-content').style.display==='none'?'':'none'">
            <span style="font-weight:600;font-size:0.9rem">📋 服务日志</span>
            <span id="log-error-badge" style="background:#ef4444;color:#fff;padding:1px 8px;border-radius:10px;font-size:0.75rem;display:none">0 错误</span>
          </div>
          <div id="log-content" style="max-height:500px;overflow-y:auto;padding:0.5rem;font-family:monospace;font-size:0.8rem;line-height:1.6"></div>
        </div>
      </div>

      <div class="tweet-feed" id="tweet-feed"></div>
      <div style="text-align:center;padding:2rem 0">
        <button class="btn btn-secondary" id="btn-more" onclick="loadMore()" style="display:none">加载更多</button>
      </div>
    </div>

    <!-- ====== 资讯 Tab ====== -->
    <div id="tab-news" style="display:none">
      <section class="stats-bar">
        <div class="stat-card stat-total"><div class="stat-icon">结果</div><div class="stat-body"><div class="stat-value" id="stat-total">0</div><div class="stat-label">当前结果</div></div></div>
        <div class="stat-card stat-translated"><div class="stat-icon">翻译</div><div class="stat-body"><div class="stat-value" id="stat-translated">0</div><div class="stat-label">已翻译</div></div></div>
        <div class="stat-card stat-sources"><div class="stat-icon">来源</div><div class="stat-body"><div class="stat-value" id="stat-sources">0</div><div class="stat-label">来源数</div></div></div>
      </section>
      <section class="panel control-panel collapsed">
        <div class="panel-header" onclick="this.closest('.panel').classList.toggle('collapsed')">
          <h2>控制面板</h2><div class="panel-toggle"><span class="chevron">▾</span></div>
        </div>
        <div class="panel-body">
          <div class="btn-group">
            <button class="btn btn-start" onclick="fetch('/api/scrape',{method:'POST'}).then(()=>toast('爬虫已启动','success'))"><span class="btn-icon">▶</span>开始抓取</button>
            <button class="btn btn-stop" onclick="fetch('/api/stop',{method:'POST'}).then(()=>toast('爬虫已停止','info'))"><span class="btn-icon">■</span>停止</button>
          </div>
        </div>
      </section>
      <section id="article-list" class="article-grid"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>Basketball Pulse &copy; 2026 — NBA 球星动态聚合</p>
      <p class="footer-tech">Python · Playwright · Flask · Twitter API · Cached Fallback · Video AI</p>
    </div>
  </footer>

  <script>
    window.__INITIAL_SOURCES__ = {{ available_sources | tojson }};
    let _tweets=[], _articles=[], _players=[], _selPlayer='', _shown=20;
    let _tPoll=null, _vPoll=null;

    function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function ago(iso){if(!iso)return'';try{const d=new Date(iso),s=(Date.now()-d)/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+' 分钟前';if(s<86400)return Math.floor(s/3600)+' 小时前';if(s<604800)return Math.floor(s/86400)+' 天前';return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});}catch{return iso;}}

    function toggleTheme(){const dk=document.body.classList.toggle('dark');document.getElementById('theme-icon').textContent=dk?'☀️':'🌙';localStorage.setItem('theme',dk?'dark':'light');}
    if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.getElementById('theme-icon').textContent='☀️';}

    function toast(m,t,ms){t=t||'info';ms=ms||3000;const c=document.getElementById('toast-container'),e=document.createElement('div');e.className='toast toast-'+t;const icons={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};e.innerHTML='<span>'+( icons[t]||'')+'</span> '+esc(m);c.appendChild(e);requestAnimationFrame(()=>e.classList.add('toast-show'));setTimeout(()=>{e.classList.remove('toast-show');setTimeout(()=>e.remove(),300);},ms);}
    function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('show');}
    function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}

    function switchTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-news').style.display=tab==='news'?'':'none';document.getElementById('tab-tweets').style.display=tab==='tweets'?'':'none';if(tab==='tweets'){loadTweets();loadPlayers();}if(tab==='news')loadArticles();}

    async function loadPlayers(){try{const r=await fetch('/api/players');if(!r.ok)return;_players=await r.json();const s=document.getElementById('player-filter'),c=_selPlayer;s.innerHTML='<option value="">全部球星</option>'+_players.map(p=>`<option value="${esc(p.handle)}">${esc(p.name)}</option>`).join('');if(c)s.value=c;}catch{}}

    async function loadTweets(){try{const r=await fetch('/api/tweets');if(!r.ok)return;_tweets=await r.json();_shown=20;filterTweets();}catch{toast('加载失败','error');}}

    function filterTweets(){
      const q=(document.getElementById('tweet-search').value||'').toLowerCase().trim();
      let f=_tweets;
      if(_selPlayer)f=f.filter(t=>(t.player_handle||'').toLowerCase()===_selPlayer.toLowerCase());
      if(q)f=f.filter(t=>(t.content_cn||'').toLowerCase().includes(q)||(t.content||'').toLowerCase().includes(q)||(t.player_name||'').toLowerCase().includes(q));
      render(f);stats(f);
    }
    function onPlayerFilter(){_selPlayer=document.getElementById('player-filter').value;_shown=20;filterTweets();}

    function render(tweets){
      const c=document.getElementById('tweet-feed'),vis=tweets.slice(0,_shown);
      if(!vis.length){c.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)"><div style="font-size:3rem">🐦</div><p>暂无推文</p><p>点击"抓取推文"获取最新球星动态</p></div>';document.getElementById('btn-more').style.display='none';return;}
      c.innerHTML=vis.map((t,i)=>{
        const init=(t.player_name||'?')[0], hasV=!!t.video_url;
        let media='';
        if(hasV){
          const poster=t.cover_image_path?'/covers/'+esc(t.cover_image_path.replace('covers/','')):'';
          media=`<div class="tweet-video"><video controls preload="metadata" poster="${poster}"><source src="${esc(t.video_url)}" type="video/mp4"></video><span class="video-badge">🎬 ${t.video_duration||''}s</span></div>`;
        }else if(t.cover_image_path){
          const u='/covers/'+esc(t.cover_image_path.replace('covers/',''));
          media=`<div class="tweet-screenshot" onclick="openLightbox('${u}')"><img src="${u}" alt="Tweet" loading="lazy"></div>`;
        }
        const tr=t.translation_status==='completed';
        return `<div class="tweet-item" style="animation-delay:${i*0.04}s">
          <div class="tweet-header">
            <div class="tweet-avatar">${esc(init)}</div>
            <div class="tweet-author"><div class="tweet-author-name">${esc(t.player_name)}${tr?' <span class="translated-badge" style="font-size:0.7rem;vertical-align:middle">已翻译</span>':''}</div><div class="tweet-author-handle">@${esc(t.player_handle)}</div></div>
            <div class="tweet-time">${ago(t.tweet_date)}</div>
          </div>
          <div class="tweet-body"><div class="tweet-text-cn">${esc(t.content_cn||t.content)}</div>${t.content_cn?`<div class="tweet-text-en">${esc(t.content)}</div>`:''}</div>
          ${media}
          ${!hasV&&t.cover_image_path?'<span class="no-video-badge">⏳ 待生成视频</span>':''}
          <div class="tweet-footer"><span style="color:var(--text-muted);font-size:0.8rem">${hasV?'🎬 视频':'📸 截图'}</span><a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer">查看原文 →</a></div>
        </div>`;
      }).join('');
      document.getElementById('btn-more').style.display=tweets.length>_shown?'':'none';
    }
    function loadMore(){_shown+=20;filterTweets();}
    function stats(t){document.getElementById('ts-total').textContent=t.length;document.getElementById('ts-players').textContent=new Set(t.map(x=>x.player_handle)).size;document.getElementById('ts-videos').textContent=t.filter(x=>x.video_url).length;document.getElementById('ts-translated').textContent=t.filter(x=>x.translation_status==='completed').length;}

    /* 推文爬虫 */
    async function startTweetScraper(){try{const r=await fetch('/api/scrape-tweets',{method:'POST'});const d=await r.json();if(!r.ok){toast(d.error,'error');return;}document.getElementById('btn-scrape').disabled=true;document.getElementById('btn-scrape').textContent='⏳ 抓取中...';document.getElementById('btn-stop-scrape').style.display='';document.getElementById('log-panel').style.display='block';document.getElementById('log-content').innerHTML='<div style="color:var(--text-muted)">正在启动抓取...</div>';toast('推文爬虫已启动','success');if(!_tPoll)_tPoll=setInterval(pollTweet,3000);}catch(e){toast('失败','error');}}
    async function stopTweetScraper(){try{await fetch('/api/stop-tweets',{method:'POST'});document.getElementById('btn-stop-scrape').style.display='none';document.getElementById('btn-scrape').disabled=false;document.getElementById('btn-scrape').textContent='🐦 抓取推文';toast('已请求停止抓取','info');}catch{}}
    async function pollTweet(){
      try{
        const r=await fetch('/api/tweet-status');
        const d=await r.json();
        // 更新日志面板
        updateLogPanel(d.recent_logs, d.error_count);
        // 实时刷新推文列表
        await loadTweets();
        if(d.status==='idle'){
          document.getElementById('btn-scrape').disabled=false;
          document.getElementById('btn-scrape').textContent='🐦 抓取推文';
          document.getElementById('btn-stop-scrape').style.display='none';
          if(_tPoll){clearInterval(_tPoll);_tPoll=null;}
          if(d.source_mode==='cache'){
            toast(d.source_message||'实时源不可用，当前显示缓存数据','warning');
          } else if(d.error_count>0){
            toast('抓取完成，但有 '+d.error_count+' 个错误，请查看日志','warning');
          } else if(d.tweet_count>0){
            toast('抓取完成！'+d.tweet_count+' 条推文','success');
          } else {
            toast(d.source_message||'抓取完成但未获取到新推文，请检查实时源状态','warning');
          }
        }
      }catch{}
    }
    // 页面加载时检查抓取状态，恢复 UI
    async function checkTweetStatus(){
      try{
        const r=await fetch('/api/tweet-status');
        const d=await r.json();
        if(d.status==='running'){
          document.getElementById('btn-scrape').disabled=true;
          document.getElementById('btn-scrape').textContent='⏳ 抓取中...';
          document.getElementById('btn-stop-scrape').style.display='';
          document.getElementById('log-panel').style.display='block';
          updateLogPanel(d.recent_logs, d.error_count);
          if(!_tPoll)_tPoll=setInterval(pollTweet,3000);
        } else if(d.recent_logs && d.recent_logs.length>0){
          // 显示上次的日志
          document.getElementById('log-panel').style.display='block';
          updateLogPanel(d.recent_logs, d.error_count);
        }
      }catch{}
    }

    function updateLogPanel(logs, errorCount){
      const panel=document.getElementById('log-panel');
      const content=document.getElementById('log-content');
      const badge=document.getElementById('log-error-badge');
      if(!logs||logs.length===0){panel.style.display='none';return;}
      panel.style.display='block';
      if(errorCount>0){badge.style.display='';badge.textContent=errorCount+' 错误';}
      else{badge.style.display='none';}
      const colors={info:'var(--text-muted)',success:'#10b981',warn:'#f59e0b',error:'#ef4444'};
      content.innerHTML=logs.map(l=>{
        const c=colors[l.level]||colors.info;
        return '<div style="color:'+c+'"><span style="opacity:0.6">'+esc(l.time)+'</span> '+esc(l.msg)+'</div>';
      }).join('');
      content.scrollTop=content.scrollHeight;
    }

    /* 视频生成 */
    async function startVideoGen(){try{const r=await fetch('/api/generate-videos',{method:'POST'});const d=await r.json();if(!r.ok){toast(d.error,'error');return;}document.getElementById('btn-video').disabled=true;document.getElementById('btn-video').textContent='⏳ 生成中...';document.getElementById('video-progress').classList.add('active');toast('视频生成已启动','success');if(!_vPoll)_vPoll=setInterval(pollVideo,3000);}catch(e){toast('失败','error');}}
    async function pollVideo(){try{const r=await fetch('/api/video-status');const d=await r.json();const p=d.total>0?Math.round(d.with_video/d.total*100):0;document.getElementById('vp-fill').style.width=p+'%';document.getElementById('vp-text').textContent=`视频: ${d.with_video}/${d.total} (${p}%)`;if(d.status==='idle'){document.getElementById('btn-video').disabled=false;document.getElementById('btn-video').textContent='🎬 生成视频';document.getElementById('video-progress').classList.remove('active');if(_vPoll){clearInterval(_vPoll);_vPoll=null;}await loadTweets();toast(`视频完成 ${d.with_video}/${d.total}`,'success');}}catch{}}

    /* 资讯 */
    async function loadArticles(){try{const r=await fetch('/api/articles');if(!r.ok)return;_articles=await r.json();const c=document.getElementById('article-list');c.className='article-grid';if(!_articles.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>暂无资讯</p></div>';return;}c.innerHTML=_articles.slice(0,20).map((a,i)=>`<article class="article-card" style="--i:${i}"><div class="card-top"><span class="source-badge">${esc(a.source)}</span></div><h2 class="title-cn">${esc(a.title_cn||a.title)}</h2><p class="title-en">${esc(a.title)}</p><p class="summary">${esc(a.summary_cn||a.summary||'')}</p><div class="card-footer"><span class="date">🕐 ${ago(a.publish_date)}</span><a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" class="read-link">阅读原文 →</a></div></article>`).join('');document.getElementById('stat-total').textContent=_articles.length;document.getElementById('stat-translated').textContent=_articles.filter(a=>a.translation_status==='completed').length;document.getElementById('stat-sources').textContent=new Set(_articles.map(a=>a.source)).size;}catch{}}

    document.addEventListener('DOMContentLoaded',()=>{loadTweets();loadPlayers();checkTweetStatus();});
  </script>
</body>
</html>
