<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basketball Pulse · NBA 球星动态</title>
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .tab-bar { display:flex; gap:0; margin-bottom:1.5rem; border-bottom:2px solid var(--border); }
    .tab-btn { padding:0.75rem 1.5rem; background:none; border:none; border-bottom:3px solid transparent; font-size:1rem; font-weight:600; color:var(--text-muted); cursor:pointer; transition:var(--transition); }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--primary); border-bottom-color:var(--primary); }
    .tweet-feed { max-width:960px; margin:0 auto; display:flex; flex-direction:column; gap:1.2rem; }
    .tweet-item { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow-sm); overflow:hidden; transition:var(--transition); border:1px solid var(--border); }
    .tweet-item:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
    .tweet-header { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.2rem 0.5rem; }
    .tweet-avatar { width:44px; height:44px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:700; font-size:1.1rem; flex-shrink:0; }
    .tweet-author { flex:1; }
    .tweet-author-name { font-weight:700; font-size:1rem; color:var(--text); }
    .tweet-author-handle { color:var(--text-muted); font-size:0.85rem; }
    .tweet-time { color:var(--text-subtle); font-size:0.8rem; }
    .tweet-body { padding:0.25rem 1.2rem 0.75rem; }
    .tweet-text-cn { font-size:1.05rem; line-height:1.7; color:var(--text); margin-bottom:0.4rem; }
    .tweet-text-en { font-size:0.85rem; color:var(--text-muted); line-height:1.5; }
    .tweet-screenshot { width:100%; cursor:pointer; }
    .tweet-screenshot img { width:100%; display:block; border-top:1px solid var(--border); border-bottom:1px solid var(--border); }
    .tweet-video { width:100%; position:relative; background:#000; }
    .tweet-video video { width:100%; max-height:480px; display:block; }
    .video-badge { position:absolute; top:8px; right:8px; background:rgba(0,0,0,0.7); color:#fff; padding:2px 8px; border-radius:4px; font-size:0.75rem; }
    .no-video-badge { display:inline-block; background:var(--warning-soft); color:var(--warning); padding:2px 10px; border-radius:12px; font-size:0.75rem; margin:0.5rem 1.2rem; }
    .tweet-footer { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 1.2rem 1rem; border-top:1px solid var(--border); }
    .tweet-footer a { color:var(--primary); font-size:0.85rem; text-decoration:none; font-weight:600; }
    .tweet-footer a:hover { text-decoration:underline; }
    .action-bar { max-width:960px; margin:0 auto 1.2rem; display:flex; gap:0.75rem; align-items:center; flex-wrap:wrap; }
    .action-bar .btn { padding:0.6rem 1.2rem; border-radius:8px; border:none; cursor:pointer; font-size:0.9rem; font-weight:600; transition:var(--transition); }
    .btn-primary { background:var(--primary); color:#fff; }
    .btn-primary:hover { opacity:0.85; }
    .btn-primary:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-secondary { background:var(--bg-card); color:var(--text); border:1px solid var(--border) !important; }
    .btn-video { background:#e91e63; color:#fff; }
    .btn-video:hover { background:#c2185b; }
    .btn-video:disabled { opacity:0.5; cursor:not-allowed; }
    .action-bar select, .action-bar input { padding:0.5rem 0.8rem; border-radius:8px; border:1px solid var(--border); background:var(--bg-card); color:var(--text); font-size:0.9rem; }
    .action-bar input { flex:1; min-width:150px; }
    .mini-stats { max-width:960px; margin:0 auto 1rem; display:flex; gap:1rem; flex-wrap:wrap; }
    .mini-stat { display:flex; align-items:center; gap:0.4rem; font-size:0.85rem; color:var(--text-muted); }
    .mini-stat strong { color:var(--text); font-size:1.1rem; }
    .gen-progress { max-width:680px; margin:0 auto; padding:0.5rem 0; display:none; }
    .gen-progress.active { display:block; }
    .gen-progress-bar { height:6px; background:var(--border); border-radius:3px; overflow:hidden; }
    .gen-progress-fill { height:100%; background:var(--primary); border-radius:3px; transition:width 0.3s; }
    .gen-progress-text { font-size:0.8rem; color:var(--text-muted); margin-top:4px; }
    .lightbox { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:999; justify-content:center; align-items:center; }
    .lightbox.show { display:flex; }
    .lightbox img { max-width:95%; max-height:90vh; border-radius:8px; }
    .lightbox-close { position:absolute; top:20px; right:30px; color:#fff; font-size:2rem; cursor:pointer; z-index:1000; }
    @media(max-width:768px) { .tweet-feed,.action-bar,.mini-stats { padding:0 0.5rem; } }
  </style>
</head>
<body>
  <div id="toast-container"></div>
  <div class="lightbox" id="lightbox" onclick="closeLightbox()">
    <span class="lightbox-close">&times;</span>
    <img id="lightbox-img" src="" alt="">
  </div>

  <header>
    <div class="header-inner">
      <div class="brand">
        <img src="/static/logo.png" alt="Basketball Pulse" style="height:48px;width:48px;border-radius:50%;margin-right:8px">
        <div>
          <h1>Basketball Pulse</h1>
          <p class="subtitle">NBA 球星实时动态 · 推文 · AI 视频</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="切换主题"><span id="theme-icon">🌙</span></button>
      </div>
    </div>
  </header>

  <main>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('tweets',this)">🐦 球星推文</button>
      <button class="tab-btn" onclick="switchTab('videos',this)">🎬 生成视频</button>
      <button class="tab-btn" onclick="switchTab('news',this)">📰 资讯列表</button>
    </div>

    <!-- ====== 推文 Tab (默认) ====== -->
    <div id="tab-tweets">
      <div class="mini-stats">
        <div class="mini-stat">🐦 <strong id="ts-total">0</strong> 推文</div>
        <div class="mini-stat">👤 <strong id="ts-players">0</strong> 球星</div>
        <div class="mini-stat">🎬 <strong id="ts-videos">0</strong> 视频</div>
        <div class="mini-stat">🌐 <strong id="ts-translated">0</strong> 已翻译</div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" id="btn-scrape" onclick="startTweetScraper()">🐦 抓取推文</button>
        <button class="btn btn-stop" id="btn-stop-scrape" onclick="stopTweetScraper()" style="display:none">⏹ 停止抓取</button>
        <button class="btn btn-video" id="btn-video" onclick="startVideoGen()" disabled>🎬 生成视频</button>
        <button class="btn btn-stop" id="btn-stop-video" onclick="stopVideoGen()" style="display:none">⏹ 停止生成</button>
        <select id="ai-backend" style="padding:0.5rem 0.8rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:0.9rem"><option value="claude">Claude Opus 4.6</option><option value="gpt">Azure GPT</option></select>
        <label style="display:flex;align-items:center;gap:0.35rem;font-size:0.85rem;color:var(--text);padding:0.5rem 0.6rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-card);cursor:pointer" title="对带原视频的推文，识别高光段并保留原音 + 中译字幕">
          <input type="checkbox" id="chk-highlight" style="margin:0">高光原声
        </label>
        <button class="btn" style="background:#6366f1;color:#fff;display:none" id="btn-select-all" onclick="toggleSelectAll()">☑ 全选待生成</button>
        <span id="video-server-status" style="font-size:0.85rem;padding:0.5rem 0.8rem;border-radius:8px;background:#374151;color:#9ca3af">Video服务器: --</span>
        <button class="btn" style="background:#10b981;color:#fff" onclick="startVideoServer()">▶ 启动Video</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="shutdownVideoServer()">⏹ 关闭Video</button>
        <button class="btn" style="background:#f59e0b;color:#fff" onclick="restartVideoServer()">🔄 重启Video</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="shutdownServer()">⏹ 关闭Crawler</button>
        <button class="btn" style="background:#f59e0b;color:#fff" onclick="restartServer()">🔄 重启Crawler</button>
      </div>
      <div class="action-bar">
        <select id="player-filter" onchange="onPlayerFilter()"><option value="">全部球星</option></select>
        <input type="text" id="tweet-search" placeholder="搜索推文..." oninput="filterTweets()">
      </div>
      <div class="gen-progress" id="video-progress">
        <div class="gen-progress-bar"><div class="gen-progress-fill" id="vp-fill" style="width:0%"></div></div>
        <div class="gen-progress-text" id="vp-text">生成视频中...</div>
      </div>

      <!-- 服务日志面板 -->
      <div id="log-panel" style="max-width:960px;margin:0 auto 1rem">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 1rem;background:var(--border);cursor:pointer" onclick="document.getElementById('log-content').style.display=document.getElementById('log-content').style.display==='none'?'':'none'">
            <span style="font-weight:600;font-size:0.9rem">📋 服务日志</span>
            <span id="log-error-badge" style="background:#ef4444;color:#fff;padding:1px 8px;border-radius:10px;font-size:0.75rem;display:none">0 错误</span>
          </div>
          <div id="log-content" style="max-height:500px;overflow-y:auto;padding:0.5rem;font-family:monospace;font-size:0.8rem;line-height:1.6"></div>
        </div>
      </div>

      <div id="vlog-panel" style="max-width:960px;margin:0 auto 1rem">
        <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:0.6rem 1rem;background:var(--border);cursor:pointer" onclick="document.getElementById('vlog-content').style.display=document.getElementById('vlog-content').style.display==='none'?'':'none'">
            <span style="font-weight:600;font-size:0.9rem">🎬 Video服务器日志</span>
            <span style="font-size:0.75rem;color:var(--text-muted)">点击展开/折叠</span>
          </div>
          <div id="vlog-content" style="max-height:400px;overflow-y:auto;padding:0.5rem;font-family:monospace;font-size:0.8rem;line-height:1.6"></div>
        </div>
      </div>

      <div class="tweet-feed" id="tweet-feed"></div>
      <div style="text-align:center;padding:2rem 0">
        <div class="pagination" id="tweet-pagination" style="display:flex;justify-content:center;gap:6px;margin-top:1rem;flex-wrap:wrap"></div>
      </div>
    </div>

    <!-- ====== 视频 Tab ====== -->
    <div id="tab-videos" style="display:none">
      <div class="mini-stats">
        <div class="mini-stat">🎬 <strong id="vs-total">0</strong> 视频</div>
        <div class="mini-stat">💾 <strong id="vs-size">0</strong> MB</div>
      </div>
      <div class="action-bar">
        <button class="btn btn-primary" onclick="loadGeneratedVideos()">🔄 刷新列表</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="deleteAllVideos()">🗑 删除全部</button>
      </div>
      <div class="tweet-feed" id="video-list"></div>
    </div>

    <!-- ====== 资讯 Tab ====== -->
    <div id="tab-news" style="display:none">
      <section class="stats-bar">
        <div class="stat-card stat-total"><div class="stat-icon">结果</div><div class="stat-body"><div class="stat-value" id="stat-total">0</div><div class="stat-label">当前结果</div></div></div>
        <div class="stat-card stat-translated"><div class="stat-icon">翻译</div><div class="stat-body"><div class="stat-value" id="stat-translated">0</div><div class="stat-label">已翻译</div></div></div>
        <div class="stat-card stat-sources"><div class="stat-icon">来源</div><div class="stat-body"><div class="stat-value" id="stat-sources">0</div><div class="stat-label">来源数</div></div></div>
      </section>
      <section class="panel control-panel collapsed">
        <div class="panel-header" onclick="this.closest('.panel').classList.toggle('collapsed')">
          <h2>控制面板</h2><div class="panel-toggle"><span class="chevron">▾</span></div>
        </div>
        <div class="panel-body">
          <div class="btn-group">
            <button class="btn btn-start" onclick="fetch('/api/scrape',{method:'POST'}).then(()=>toast('爬虫已启动','success'))"><span class="btn-icon">▶</span>开始抓取</button>
            <button class="btn btn-stop" onclick="fetch('/api/stop',{method:'POST'}).then(()=>toast('爬虫已停止','info'))"><span class="btn-icon">■</span>停止</button>
          </div>
        </div>
      </section>
      <section id="article-list" class="article-grid"></section>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <p>Basketball Pulse &copy; 2026 — NBA 球星动态聚合</p>
      <p class="footer-tech">Python · Playwright · Flask · Twitter API · Cached Fallback · Video AI</p>
    </div>
  </footer>

  <script>
    window.__INITIAL_SOURCES__ = {{ available_sources | tojson }};
    let _tweets=[], _articles=[], _players=[], _selPlayer='', _page=1, _perPage=10, _videoGenCount=0, _videoGenBefore=0;
    let _tPoll=null, _vPoll=null;

    function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
    function ago(iso){if(!iso)return'';try{const d=new Date(iso),s=(Date.now()-d)/1000;if(s<60)return'刚刚';if(s<3600)return Math.floor(s/60)+' 分钟前';if(s<86400)return Math.floor(s/3600)+' 小时前';if(s<604800)return Math.floor(s/86400)+' 天前';return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric'});}catch{return iso;}}

    function toggleTheme(){const dk=document.body.classList.toggle('dark');document.getElementById('theme-icon').textContent=dk?'☀️':'🌙';localStorage.setItem('theme',dk?'dark':'light');}
    if(localStorage.getItem('theme')==='dark'){document.body.classList.add('dark');document.getElementById('theme-icon').textContent='☀️';}

    function toast(m,t,ms){t=t||'info';ms=ms||3000;const c=document.getElementById('toast-container'),e=document.createElement('div');e.className='toast toast-'+t;const icons={success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};e.innerHTML='<span>'+( icons[t]||'')+'</span> '+esc(m);c.appendChild(e);requestAnimationFrame(()=>e.classList.add('toast-show'));setTimeout(()=>{e.classList.remove('toast-show');setTimeout(()=>e.remove(),300);},ms);}
    function openLightbox(src){document.getElementById('lightbox-img').src=src;document.getElementById('lightbox').classList.add('show');}
    function closeLightbox(){document.getElementById('lightbox').classList.remove('show');}

    function switchTab(tab,btn){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-news').style.display=tab==='news'?'':'none';document.getElementById('tab-tweets').style.display=tab==='tweets'?'':'none';document.getElementById('tab-videos').style.display=tab==='videos'?'':'none';if(tab==='tweets'){loadTweets();loadPlayers();}if(tab==='news')loadArticles();if(tab==='videos')loadGeneratedVideos();}

    async function loadPlayers(){try{const r=await fetch('/api/players');if(!r.ok)return;_players=await r.json();const s=document.getElementById('player-filter'),c=_selPlayer;s.innerHTML='<option value="">全部球星</option>'+_players.map(p=>`<option value="${esc(p.handle)}">${esc(p.name)}</option>`).join('');if(c)s.value=c;}catch{}}

    async function loadTweets(){try{const r=await fetch('/api/tweets');if(!r.ok)return;_tweets=await r.json();_page=1;filterTweets();}catch{toast('加载失败','error');}}

    function filterTweets(){
      const q=(document.getElementById('tweet-search').value||'').toLowerCase().trim();
      let f=_tweets;
      if(_selPlayer)f=f.filter(t=>(t.player_handle||'').toLowerCase()===_selPlayer.toLowerCase());
      if(q)f=f.filter(t=>(t.content_cn||'').toLowerCase().includes(q)||(t.content||'').toLowerCase().includes(q)||(t.player_name||'').toLowerCase().includes(q));
      render(f);stats(_tweets);
    }
    function onPlayerFilter(){_selPlayer=document.getElementById('player-filter').value;_page=1;filterTweets();}

    function render(tweets){
      const c=document.getElementById('tweet-feed');
      const totalPages=Math.ceil(tweets.length/_perPage)||1;
      if(_page>totalPages)_page=totalPages;
      const start=(_page-1)*_perPage, vis=tweets.slice(start,start+_perPage);
      if(!vis.length){c.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)"><div style="font-size:3rem">🐦</div><p>暂无推文</p><p>点击"抓取推文"获取最新球星动态</p></div>';document.getElementById('tweet-pagination').innerHTML='';return;}
      c.innerHTML=vis.map((t,i)=>{
        const init=(t.player_name||'?')[0], hasV=!!t.video_url;
        let media='';
        if(hasV){
          const poster=t.cover_image_path?'/covers/'+esc(t.cover_image_path.replace('covers/','')):'';
          media=`<div class="tweet-video"><video controls preload="auto" poster="${poster}" style="max-width:100%;border-radius:8px"><source src="${esc(t.video_url)}" type="video/mp4"></video></div>`;
        }else if(t.cover_image_path){
          const u='/covers/'+esc(t.cover_image_path.replace('covers/',''));
          media=`<div class="tweet-screenshot" onclick="openLightbox('${u}')"><img src="${u}" alt="Tweet" loading="lazy"></div>`;
        }
        const tr=t.translation_status==='completed';
        return `<div class="tweet-item" style="animation-delay:${i*0.04}s">
          <div class="tweet-header">
            <label class="tweet-select" style="margin-right:8px;cursor:pointer" title="选择生成视频"><input type="checkbox" class="tweet-checkbox" data-tid="${esc(t.tweet_id)}" onchange="updateVideoSelection()"></label>
            <div class="tweet-avatar">${esc(init)}</div>
            <div class="tweet-author"><div class="tweet-author-name">${esc(t.player_name)}${tr?' <span class="translated-badge" style="font-size:0.7rem;vertical-align:middle">已翻译</span>':''}</div><div class="tweet-author-handle">@${esc(t.player_handle)}</div></div>
            <div class="tweet-time">${ago(t.tweet_date)}</div>
          </div>
          <div class="tweet-body"><div class="tweet-text-cn">${esc(t.content_cn||t.content)}</div>${t.content_cn?`<div class="tweet-text-en">${esc(t.content)}</div>`:''}</div>
          ${media}
          <div class="tweet-footer"><span style="color:var(--text-muted);font-size:0.8rem">${hasV?'🎬 视频':'📸 截图'}</span><a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer">查看原文 →</a></div>
        </div>`;
      }).join('');
      // 分页
      let pg='';
      if(totalPages>1){
        pg+=`<button class="btn btn-secondary" style="min-width:36px;padding:4px 10px" ${_page<=1?'disabled':''} onclick="goPage(${_page-1})">‹</button>`;
        for(let p=1;p<=totalPages;p++){
          pg+=`<button class="btn ${p===_page?'btn-primary':'btn-secondary'}" style="min-width:36px;padding:4px 10px" onclick="goPage(${p})">${p}</button>`;
        }
        pg+=`<button class="btn btn-secondary" style="min-width:36px;padding:4px 10px" ${_page>=totalPages?'disabled':''} onclick="goPage(${_page+1})">›</button>`;
      }
      document.getElementById('tweet-pagination').innerHTML=pg;
      updateVideoSelection();
    }
    function goPage(p){_page=p;filterTweets();window.scrollTo({top:document.getElementById('tweet-feed').offsetTop-80,behavior:'smooth'});}
    function stats(t){/* 本地统计仅作为后备 */document.getElementById('ts-total').textContent=t.length;document.getElementById('ts-players').textContent=new Set(t.map(x=>x.player_handle)).size;document.getElementById('ts-videos').textContent=t.filter(x=>x.video_url).length;document.getElementById('ts-translated').textContent=t.filter(x=>x.translation_status==='completed').length;}
    function applyServerStats(s){if(!s)return;document.getElementById('ts-total').textContent=s.total;document.getElementById('ts-players').textContent=s.players;document.getElementById('ts-videos').textContent=s.videos;document.getElementById('ts-translated').textContent=s.translated;}

    /* 推文爬虫 */
    async function startTweetScraper(){try{const r=await fetch('/api/scrape-tweets',{method:'POST'});const d=await r.json();if(!r.ok){toast(d.error,'error');return;}document.getElementById('btn-scrape').disabled=true;document.getElementById('btn-scrape').textContent='⏳ 抓取中...';document.getElementById('btn-stop-scrape').style.display='';document.getElementById('log-panel').style.display='block';document.getElementById('log-content').innerHTML='<div style="color:var(--text-muted)">正在启动抓取...</div>';toast('推文爬虫已启动','success');if(!_tPoll)_tPoll=setInterval(pollTweet,3000);}catch(e){toast('失败','error');}}
    async function stopTweetScraper(){try{await fetch('/api/stop-tweets',{method:'POST'});document.getElementById('btn-stop-scrape').style.display='none';document.getElementById('btn-scrape').disabled=false;document.getElementById('btn-scrape').textContent='🐦 抓取推文';toast('已请求停止抓取','info');}catch{}}
    async function stopVideoGen(){try{await fetch('/api/video-server/cancel',{method:'POST'});document.getElementById('btn-stop-video').style.display='none';document.getElementById('btn-video').disabled=false;document.getElementById('btn-video').textContent='🎬 生成视频';toast('已请求停止视频生成','info');}catch{toast('停止失败','error');}}
    async function pollTweet(){
      try{
        const r=await fetch('/api/tweet-status');
        const d=await r.json();
        if(d.stats)applyServerStats(d.stats);
        // 更新日志面板
        updateLogPanel(d.recent_logs, d.error_count);
        // 实时刷新推文列表
        await loadTweets();
        if(d.status==='idle' && d.screenshot_status==='idle'){
          // 抓取和截图都完成了，停止轮询
          document.getElementById('btn-scrape').disabled=false;
          document.getElementById('btn-scrape').textContent='🐦 抓取推文';
          document.getElementById('btn-stop-scrape').style.display='none';
          if(_tPoll){clearInterval(_tPoll);_tPoll=null;}
          if(d.source_mode==='cache'){
            toast(d.source_message||'实时源不可用，当前显示缓存数据','warning');
          } else if(d.error_count>0){
            toast('抓取完成，但有 '+d.error_count+' 个错误，请查看日志','warning');
          } else if(d.tweet_count>0){
            toast('全部完成！'+d.tweet_count+' 条推文（含截图）','success');
          } else {
            toast(d.source_message||'抓取完成但未获取到新推文，请检查实时源状态','warning');
          }
        } else if(d.status==='idle' && d.screenshot_status==='running'){
          // 抓取完成但截图还在进行，更新按钮文字但继续轮询
          document.getElementById('btn-scrape').textContent='📸 截图中...';
          document.getElementById('btn-stop-scrape').style.display='none';
        }
      }catch{}
    }
    // 页面加载时检查抓取状态，恢复 UI
    async function checkTweetStatus(){
      try{
        const r=await fetch('/api/tweet-status');
        const d=await r.json();
        if(d.stats)applyServerStats(d.stats);
        if(d.status==='running'){
          document.getElementById('btn-scrape').disabled=true;
          document.getElementById('btn-scrape').textContent='⏳ 抓取中...';
          document.getElementById('btn-stop-scrape').style.display='';
          document.getElementById('log-panel').style.display='block';
          updateLogPanel(d.recent_logs, d.error_count);
          if(!_tPoll)_tPoll=setInterval(pollTweet,3000);
        } else if(d.screenshot_status==='running'){
          document.getElementById('btn-scrape').disabled=true;
          document.getElementById('btn-scrape').textContent='📸 截图中...';
          document.getElementById('log-panel').style.display='block';
          updateLogPanel(d.recent_logs, d.error_count);
          if(!_tPoll)_tPoll=setInterval(pollTweet,3000);
        } else if(d.recent_logs && d.recent_logs.length>0){
          document.getElementById('log-panel').style.display='block';
          updateLogPanel(d.recent_logs, d.error_count);
        }
      }catch{}
    }

    function updateLogPanel(logs, errorCount){
      const panel=document.getElementById('log-panel');
      const content=document.getElementById('log-content');
      const badge=document.getElementById('log-error-badge');
      if(!logs||logs.length===0){panel.style.display='none';return;}
      panel.style.display='block';
      if(errorCount>0){badge.style.display='';badge.textContent=errorCount+' 错误';}
      else{badge.style.display='none';}
      const colors={info:'var(--text-muted)',success:'#10b981',warn:'#f59e0b',error:'#ef4444'};
      content.innerHTML=logs.map(l=>{
        const c=colors[l.level]||colors.info;
        return '<div style="color:'+c+'"><span style="opacity:0.6">'+esc(l.time)+'</span> '+esc(l.msg)+'</div>';
      }).join('');
      content.scrollTop=content.scrollHeight;
    }

    /* 视频生成 - 选择模式 */
    function updateVideoSelection(){
      const checked=document.querySelectorAll('.tweet-checkbox:checked');
      const btn=document.getElementById('btn-video');
      if(checked.length>0){btn.textContent=`🎬 生成视频 (${checked.length})`;btn.disabled=false;} else {btn.textContent='🎬 生成视频';btn.disabled=true;}
      document.getElementById('btn-select-all').style.display=_tweets.length>0?'':'none';
    }
    function toggleSelectAll(){
      const boxes=document.querySelectorAll('.tweet-checkbox');
      const allChecked=[...boxes].every(b=>b.checked);
      boxes.forEach(b=>{b.checked=!allChecked;});
      updateVideoSelection();
    }
    async function startVideoGen(){
      const checked=[...document.querySelectorAll('.tweet-checkbox:checked')].map(cb=>cb.dataset.tid);
      const backend=document.getElementById('ai-backend').value;
      const highlight=document.getElementById('chk-highlight').checked;
      const body=checked.length>0?{tweet_ids:checked,backend,highlight}:{backend,highlight};
      try{
        const r=await fetch('/api/generate-videos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
        const d=await r.json();if(!r.ok){toast(d.error,'error');return;}
        document.getElementById('btn-video').disabled=true;document.getElementById('btn-video').textContent='⏳ 生成中...';
        document.getElementById('btn-stop-video').style.display='';
        document.getElementById('video-progress').classList.add('active');
        toast(`视频生成已启动 (${d.count} 条)`,'success');
        _videoGenCount=d.count;
        _videoGenBefore=_tweets.filter(t=>t.video_url).length;
        if(!_vPoll)_vPoll=setInterval(pollVideo,3000);
        document.getElementById('vlog-panel').style.display='block';
        document.getElementById('vlog-content').innerHTML='<div style="color:#9ca3af">正在连接 Video 服务器...</div>';
        pollVideoLogs();
        if(!_vlogPoll)_vlogPoll=setInterval(pollVideoLogs,3000);
      }catch(e){toast('失败','error');}}
    async function pollVideo(){try{const r=await fetch(`/api/video-status?ts=${Date.now()}`,{cache:'no-store'});const d=await r.json();const done=d.gen_current||0;const total=d.gen_total||1;const p=total>0?Math.min(Math.round(done/total*100),100):0;const lastLog=(d.video_last_log||'').replace(/^\[[^\]]+\]\s*\[[^\]]+\]\s*/,'');document.getElementById('vp-fill').style.width=p+'%';document.getElementById('vp-text').textContent=lastLog?`视频生成: ${done}/${total} (${p}%) · ${lastLog}`:`视频生成: ${done}/${total} (${p}%)`;await pollVideoLogs();if(d.status==='idle'){document.getElementById('btn-video').disabled=false;document.getElementById('btn-video').textContent='🎬 生成视频';document.getElementById('btn-stop-video').style.display='none';document.getElementById('video-progress').classList.remove('active');if(_vPoll){clearInterval(_vPoll);_vPoll=null;}if(_vlogPoll){clearInterval(_vlogPoll);_vlogPoll=null;}if(_videoGenCount>0){_videoGenCount=0;_videoGenBefore=0;await loadTweets();toast('视频生成完成','success');}}}catch{}}

    /* 生成视频列表 */
    async function deleteVideo(filename){
      if(!confirm(`确定删除 ${filename}？`))return;
      try{const r=await fetch(`/api/generated-video/${filename}`,{method:'DELETE'});const d=await r.json();toast(d.message||d.error,r.ok?'success':'error');loadGeneratedVideos();}catch{toast('删除失败','error');}
    }
    async function deleteAllVideos(){
      if(!confirm('确定删除所有生成的视频？此操作不可撤销！'))return;
      try{const r=await fetch('/api/generated-videos',{method:'DELETE'});const d=await r.json();toast(d.message||d.error,r.ok?'success':'error');loadGeneratedVideos();}catch{toast('删除失败','error');}
    }
    async function loadGeneratedVideos(){
      const list=document.getElementById('video-list');
      try{
        const r=await fetch('/api/generated-videos');
        const videos=await r.json();
        document.getElementById('vs-total').textContent=videos.length;
        const totalMB=videos.reduce((s,v)=>s+v.size_mb,0);
        document.getElementById('vs-size').textContent=totalMB.toFixed(1);
        if(!videos.length){
          list.innerHTML='<div style="text-align:center;padding:3rem;color:var(--text-muted)"><div style="font-size:3rem">🎬</div><p>暂无生成视频</p><p>在推文tab选择推文后点击"生成视频"</p></div>';
          return;
        }
        list.innerHTML=videos.map((v,i)=>`<div class="tweet-item" style="animation-delay:${i*0.04}s">
          <div class="tweet-header">
            <div class="tweet-avatar">🎬</div>
            <div class="tweet-author"><div class="tweet-author-name">${esc(v.filename)}</div><div class="tweet-author-handle">${v.size_mb} MB · ${v.created}</div></div>
            <button class="btn" style="background:#ef4444;color:#fff;padding:4px 10px;font-size:0.8rem;margin-left:auto" onclick="deleteVideo('${esc(v.filename)}')">🗑 删除</button>
          </div>
          <div class="tweet-video"><video controls preload="metadata" style="max-width:100%;border-radius:8px"><source src="/api/generated-video/${esc(v.filename)}" type="video/mp4"></video></div>
          <div class="tweet-footer"><a href="/api/generated-video/${esc(v.filename)}" download="${esc(v.filename)}">下载视频 ↓</a></div>
        </div>`).join('');
      }catch{
        list.innerHTML='<div style="text-align:center;padding:2rem;color:var(--text-muted)">Video服务器离线，无法加载视频列表</div>';
      }
    }

    /* 资讯 */
    async function loadArticles(){try{const r=await fetch('/api/articles');if(!r.ok)return;_articles=await r.json();const c=document.getElementById('article-list');c.className='article-grid';if(!_articles.length){c.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>暂无资讯</p></div>';return;}c.innerHTML=_articles.slice(0,20).map((a,i)=>`<article class="article-card" style="--i:${i}"><div class="card-top"><span class="source-badge">${esc(a.source)}</span></div><h2 class="title-cn">${esc(a.title_cn||a.title)}</h2><p class="title-en">${esc(a.title)}</p><p class="summary">${esc(a.summary_cn||a.summary||'')}</p><div class="card-footer"><span class="date">🕐 ${ago(a.publish_date)}</span><a href="${esc(a.url)}" target="_blank" rel="noopener noreferrer" class="read-link">阅读原文 →</a></div></article>`).join('');document.getElementById('stat-total').textContent=_articles.length;document.getElementById('stat-translated').textContent=_articles.filter(a=>a.translation_status==='completed').length;document.getElementById('stat-sources').textContent=new Set(_articles.map(a=>a.source)).size;}catch{}}

    document.addEventListener('DOMContentLoaded',()=>{loadTweets();loadPlayers();checkTweetStatus();});

    async function shutdownServer(){
      if(!confirm('确定要关闭服务器吗？')) return;
      try{
        const r=await fetch('/api/shutdown',{method:'POST'});
        const d=await r.json();
        toast(d.message||'服务器正在关闭...','info');
      }catch{toast('服务器已关闭','info');}
    }

    async function restartServer(){
      if(!confirm('确定要重启服务器吗？')) return;
      try{
        await fetch('/api/restart',{method:'POST'});
      }catch{}
      toast('服务器重启中，3秒后刷新页面...','info');
      setTimeout(()=>{location.reload();},3000);
    }

    /* Video 服务器管理 */
    async function checkVideoServer(){
      try{
        const r=await fetch('/api/video-server/health');
        const d=await r.json();
        const el=document.getElementById('video-server-status');
        if(d.online){el.textContent='Video服务器: 在线';el.style.background='#065f46';el.style.color='#6ee7b7';}
        else{el.textContent='Video服务器: 离线';el.style.background='#7f1d1d';el.style.color='#fca5a5';}
      }catch{
        const el=document.getElementById('video-server-status');
        el.textContent='Video服务器: 未知';el.style.background='#374151';el.style.color='#9ca3af';
      }
    }
    async function startVideoServer(){
      try{const r=await fetch('/api/video-server/start',{method:'POST'});const d=await r.json();toast(d.message||d.error,'info');
        const el=document.getElementById('video-server-status');el.textContent='Video服务器: 启动中...';el.style.background='#854d0e';el.style.color='#fef08a';
        setTimeout(checkVideoServer,2000);setTimeout(checkVideoServer,5000);
      }catch{toast('启动失败','error');}
    }
    async function shutdownVideoServer(){
      if(!confirm('确定要关闭 Video 服务器吗？')) return;
      try{await fetch('/api/video-server/shutdown',{method:'POST'});
        const el=document.getElementById('video-server-status');el.textContent='Video服务器: 离线';el.style.background='#7f1d1d';el.style.color='#fca5a5';
        toast('Video 服务器已关闭','info');setTimeout(checkVideoServer,3000);
      }catch{toast('关闭失败','error');}
    }
    async function restartVideoServer(){
      if(!confirm('确定要重启 Video 服务器吗？')) return;
      const el=document.getElementById('video-server-status');el.textContent='Video服务器: 重启中...';el.style.background='#854d0e';el.style.color='#fef08a';
      try{await fetch('/api/video-server/restart',{method:'POST'});
        toast('Video 服务器重启中...','info');setTimeout(checkVideoServer,2000);setTimeout(checkVideoServer,5000);setTimeout(checkVideoServer,8000);
      }catch{toast('重启失败','error');}
    }
    // 页面加载时检查 Video 服务器状态
    checkVideoServer();setInterval(checkVideoServer,30000);
    pollVideoLogs();setInterval(pollVideoLogs,3000);

    /* Video 服务器日志 */
    let _vlogPoll=null;
    async function pollVideoLogs(){
      try{
        const r=await fetch(`/api/video-server/logs?ts=${Date.now()}`,{cache:'no-store'});
        const text=await r.json();
        const el=document.getElementById('vlog-content');
        if(!text){
          el.innerHTML='<div style="color:#6b7280">暂无日志</div>';
          return;
        }
        // 纯文本日志，按行渲染并染色
        const lines=(typeof text==='string'?text:JSON.stringify(text,null,2)).split('\n').filter(l=>l.trim());
        el.innerHTML=lines.map(l=>{
          let color='#9ca3af';
          if(l.includes('[error]'))color='#ef4444';
          else if(l.includes('[warn]'))color='#f59e0b';
          else if(l.includes('[success]'))color='#10b981';
          return `<div style="color:${color}">${l.replace(/</g,'&lt;')}</div>`;
        }).join('');
        el.scrollTop=el.scrollHeight;
      }catch{
        document.getElementById('vlog-content').innerHTML='<div style="color:#6b7280">无法读取日志</div>';
      }
    }
  </script>
</body>
